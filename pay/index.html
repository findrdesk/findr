<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>findr pay — crypto payment link</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0a0a0a;color:#f0f0f0;font-family:'Space Mono',monospace;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;}

/* nav */
nav{padding:20px 40px;border-bottom:1px solid #1e1e1e;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;}
.nav-logo{font-size:20px;font-weight:700;letter-spacing:-1px;}
.nav-logo span{color:#ff4500;}
.nav-back{color:#666;text-decoration:none;font-size:11px;letter-spacing:1px;transition:color .2s;justify-self:end;}
.nav-back:hover{color:#ff4500;}
.x-follow-btn{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:2px;color:#ff4500;text-decoration:none;border:1px solid #ff4500;padding:6px 16px;background:none;animation:glitch 2s infinite;}
.x-follow-btn .x-logo{font-size:16px;font-weight:700;}
@keyframes glitch{0%{text-shadow:none;transform:translateX(0)}5%{text-shadow:2px 0 #ff4500,-2px 0 #00ffff;transform:translateX(-2px)}10%{text-shadow:-2px 0 #ff4500,2px 0 #00ffff;transform:translateX(2px)}15%{text-shadow:2px 0 #00ffff,-2px 0 #ff4500;transform:translateX(0)}20%{text-shadow:none;transform:translateX(0)}100%{text-shadow:none;transform:translateX(0)}}

/* layout */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.view{display:none;width:90%;max-width:760px;margin:0 auto;min-width:0;}
.view.active{display:block;animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* generator form */
.form-title{font-size:clamp(20px,4vw,28px);font-weight:700;letter-spacing:-1px;margin-bottom:6px;}
.form-sub{font-size:13px;color:#666;margin-bottom:32px;line-height:1.6;}
.field{margin-bottom:20px;}
.field label{display:block;font-size:10px;letter-spacing:2px;color:#666;margin-bottom:8px;}
.field label .optional{color:#444;}
.field input{width:100%;background:#111;border:1px solid #1e1e1e;color:#f0f0f0;font-family:'Space Mono',monospace;font-size:13px;padding:12px 14px;outline:none;transition:border-color .2s;}
.field input:focus{border-color:#ff4500;}
.field input::placeholder{color:#333;}
.field input[type="date"]{color-scheme:dark;}
.field input[type="date"]:invalid{color:#333;}
.pay-meta{font-family:'Space Mono',monospace;font-size:11px;color:#666;margin-bottom:8px;letter-spacing:1px;}
.pay-meta span{color:#f0f0f0;}

/* address rows */
.addr-rows{margin-bottom:20px;}
.addr-row{border:1px solid #1e1e1e;padding:16px;margin-bottom:10px;position:relative;transition:border-color .2s;animation:fadeIn .3s ease;}
.addr-row:hover{border-color:#2a2a2a;}
.addr-row-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.addr-row-num{font-size:10px;letter-spacing:2px;color:#ff4500;}
.addr-remove{background:none;border:1px solid #1e1e1e;color:#444;font-family:'Space Mono',monospace;font-size:11px;width:28px;height:28px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;line-height:1;}
.addr-remove:hover{border-color:#ff4500;color:#ff4500;}
.addr-row .field{margin-bottom:12px;}
.addr-row .field:last-child{margin-bottom:0;}

/* chain selector */
.chain-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.chain-btn{background:#111;border:1px solid #1e1e1e;color:#666;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;padding:10px 0;cursor:pointer;transition:all .2s;text-align:center;}
.chain-btn:hover{border-color:#ff4500;color:#f0f0f0;}
.chain-btn.selected{border-color:#ff4500;color:#ff4500;background:#1a0a00;}

/* add address button */
.add-addr-btn{width:100%;background:none;border:1px dashed #1e1e1e;color:#444;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;padding:12px 0;cursor:pointer;transition:all .2s;margin-bottom:20px;}
.add-addr-btn:hover{border-color:#444;color:#666;}
.add-addr-btn:disabled{opacity:.3;cursor:not-allowed;}

/* generate button */
.gen-btn{width:100%;background:#ff4500;color:#fff;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:2px;padding:15px 0;border:none;cursor:pointer;margin-top:12px;transition:all .25s;position:relative;overflow:hidden;}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,69,0,.3);}
.gen-btn:active{transform:translateY(0);}
.gen-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

/* error */
.error{font-size:11px;color:#ff4500;margin-top:8px;display:none;}
.error.show{display:block;animation:fadeIn .3s ease;}

/* payment card */
.pay-card{background:#111;border:1px solid #1e1e1e;padding:36px 24px;position:relative;overflow:hidden;width:100%;box-sizing:border-box;}
.pay-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#ff4500,transparent);}
.pay-chain{display:inline-block;font-size:10px;letter-spacing:2px;color:#ff4500;border:1px solid #ff4500;padding:4px 12px;margin-bottom:24px;}
.pay-section{margin-bottom:24px;width:100%;box-sizing:border-box;}
.pay-label{font-size:10px;letter-spacing:2px;color:#666;margin-bottom:8px;display:block;}
.pay-address{display:flex;align-items:center;width:100%;box-sizing:border-box;gap:0;margin:0;padding:0;border:none;background:none;}
.pay-address code{flex:1;min-width:0;width:0;display:block;background:#1a1a1a;border:1px solid #333;border-right:none;padding:16px 20px;font-size:12px;font-family:'Space Mono',monospace;color:#f0f0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-sizing:border-box;}
.copy-btn{flex-shrink:0;background:transparent;border:1px solid #333;color:#ff4500;padding:16px 22px;font-size:12px;font-family:'Space Mono',monospace;cursor:pointer;white-space:nowrap;letter-spacing:1px;box-sizing:border-box;}
.copy-btn:hover{border-color:#ff4500;color:#ff4500;}
.copy-btn.copied{border-color:#ff4500;color:#ff4500;}
.pay-amount{font-size:clamp(24px,5vw,36px);font-weight:700;letter-spacing:-1px;color:#f0f0f0;}
.pay-amount .token{color:#ff4500;margin-left:8px;}
.pay-note{font-size:13px;color:#666;line-height:1.6;font-style:italic;}

/* address block layout */
.addr-block{position:relative;padding-right:180px;margin-bottom:24px;width:100%;box-sizing:border-box;}
.addr-block-qr{position:absolute;top:0;right:0;width:120px;height:120px;}
.addr-block-qr canvas,.addr-block-qr img{width:120px !important;height:120px !important;}

/* address block separator */
.addr-separator{border:none;border-top:1px solid #1e1e1e;margin:28px 0;}

/* qr */
.qr-wrap{display:flex;justify-content:center;margin-bottom:24px;}
.qr-wrap canvas,.qr-wrap img{border:8px solid #f0f0f0 !important;}

/* card buttons */
.card-actions{display:flex;gap:10px;margin-top:8px;}
.card-btn{flex:1;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;padding:13px 0;cursor:pointer;transition:all .2s;text-align:center;border:none;}
.card-btn.primary{background:#ff4500;color:#fff;}
.card-btn.primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,69,0,.3);}
.card-btn.secondary{background:transparent;border:1px solid #1e1e1e;color:#666;}
.card-btn.secondary:hover{border-color:#ff4500;color:#ff4500;}

/* footer */
footer{padding:20px 40px;border-top:1px solid #1e1e1e;display:flex;justify-content:space-between;align-items:center;}
.footer-brand{font-size:10px;color:#333;letter-spacing:1px;}
.footer-brand a{color:#666;text-decoration:none;transition:color .2s;}
.footer-brand a:hover{color:#ff4500;}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#ff4500;color:#fff;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;padding:10px 24px;opacity:0;transition:all .3s ease;pointer-events:none;z-index:50;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* responsive */
@media(max-width:600px){
  nav{padding:12px 16px;display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between;align-items:center;}
  .nav-logo{width:100%;font-size:14px;white-space:nowrap;}
  .x-follow-btn{font-size:10px;padding:4px 10px;letter-spacing:1px;}
  .nav-back{font-size:10px;}
  main{padding:20px 12px;}
  .view{width:100%;}
  .pay-card{padding:20px 14px;overflow-x:hidden;}
  .field input{font-size:12px;padding:10px 12px;}
  .chain-grid{grid-template-columns:repeat(4,1fr);gap:6px;}
  .chain-btn{font-size:9px;padding:8px 0;}
  .card-actions{flex-direction:column;}
  footer{padding:16px 20px;flex-direction:column;gap:8px;text-align:center;}
  .addr-row{padding:12px;}
  .addr-block{padding-right:0;width:100%;overflow:hidden;}
  .addr-block-qr{position:static;width:auto;height:auto;display:flex;justify-content:center;margin-top:16px;}
  .addr-block-qr canvas,.addr-block-qr img{width:160px !important;height:160px !important;}
  .pay-address{width:100%;}
  .pay-address code{font-size:9px;padding:12px 10px;white-space:normal;word-break:break-all;overflow:visible;text-overflow:unset;}
  .copy-btn{padding:12px 14px;font-size:10px;}
  .pay-amount{font-size:22px;}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">findr <span>crypto pay link</span></div>
  <a href="https://x.com/findrdesk" target="_blank" class="x-follow-btn"><span class="x-logo">&#x1d54f;</span> Follow</a>
  <a class="nav-back" href="https://findrdesk.com">FINDRDESK.COM</a>
</nav>

<main>

<!-- PAGE 1: Generator -->
<div class="view active" id="generator">
  <div class="form-title">create payment link</div>
  <p class="form-sub">generate a shareable crypto payment request. no wallet connect needed.</p>

  <div class="field">
    <label>FROM <span class="optional">(OPTIONAL)</span></label>
    <input type="text" id="fromInput" placeholder="your name or label e.g. John" autocomplete="off" spellcheck="false">
  </div>

  <div class="field">
    <label>VALID UNTIL <span class="optional">(OPTIONAL)</span></label>
    <input type="date" id="expiryInput">
  </div>

  <div class="field"><label>ADDRESSES</label></div>
  <div class="addr-rows" id="addrRows"></div>
  <button class="add-addr-btn" id="addAddrBtn">+ ADD ADDRESS</button>

  <div class="field">
    <label>AMOUNT IN USD <span class="optional">(OPTIONAL)</span></label>
    <input type="number" id="usdInput" placeholder="0.00" min="0" step="any">
  </div>

  <div class="field">
    <label>NOTE <span class="optional">(OPTIONAL)</span></label>
    <input type="text" id="noteInput" placeholder="invoice #01, donation, etc." autocomplete="off">
  </div>

  <div class="error" id="formError"></div>
  <button class="gen-btn" id="genBtn">GENERATE LINK</button>
</div>

<!-- PAGE 2: Payment Card -->
<div class="view" id="payCard">
  <div class="pay-card">
    <div id="cardGlobalTop"></div>
    <div id="cardAddresses"></div>
    <div class="card-actions" id="cardActions">
      <button class="card-btn primary" onclick="copyPayLink()">COPY LINK</button>
      <button class="card-btn primary" id="pdfBtn" onclick="downloadPdf()">DOWNLOAD PDF</button>
      <button class="card-btn secondary" onclick="showGenerator()">GENERATE NEW</button>
    </div>
  </div>
</div>

</main>

<footer>
  <span class="footer-brand">FINDR PAY — 2026</span>
  <span class="footer-brand"><a href="https://findrdesk.com">FINDRDESK.COM</a></span>
</footer>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const MAX_ROWS = 5;
let currentPayUrl = '';
let currentPayData = null;
let currentPrices = null;
const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);


/* ── address row management ── */

function createRow() {
  const rows = document.querySelectorAll('.addr-row');
  if (rows.length >= MAX_ROWS) return;
  const idx = rows.length + 1;
  const row = document.createElement('div');
  row.className = 'addr-row';
  row.innerHTML =
    '<div class="addr-row-header">' +
      '<span class="addr-row-num">ADDR ' + String(idx).padStart(2, '0') + '</span>' +
      '<button class="addr-remove" title="Remove">&times;</button>' +
    '</div>' +
    '<div class="field">' +
      '<label>WALLET ADDRESS</label>' +
      '<input type="text" class="row-wallet" placeholder="0x... or sol... or btc..." autocomplete="off" spellcheck="false">' +
    '</div>' +
    '<div class="field">' +
      '<label>CHAIN</label>' +
      '<div class="chain-grid">' +
        '<button type="button" class="chain-btn" data-chain="ETH">ETH</button>' +
        '<button type="button" class="chain-btn" data-chain="SOL">SOL</button>' +
        '<button type="button" class="chain-btn" data-chain="BTC">BTC</button>' +
        '<button type="button" class="chain-btn" data-chain="BSC">BSC</button>' +
        '<button type="button" class="chain-btn" data-chain="BASE">BASE</button>' +
        '<button type="button" class="chain-btn" data-chain="ARB">ARB</button>' +
        '<button type="button" class="chain-btn" data-chain="MATIC">MATIC</button>' +
        '<button type="button" class="chain-btn" data-chain="SUI">SUI</button>' +
      '</div>' +
    '</div>';

  /* chain buttons within this row */
  row.querySelectorAll('.chain-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      row.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });

  /* remove button */
  row.querySelector('.addr-remove').addEventListener('click', () => {
    if (document.querySelectorAll('.addr-row').length <= 1) return;
    row.remove();
    renumberRows();
    updateAddBtn();
  });

  $('addrRows').appendChild(row);
  updateAddBtn();
}

function renumberRows() {
  document.querySelectorAll('.addr-row').forEach((row, i) => {
    row.querySelector('.addr-row-num').textContent = 'ADDR ' + String(i + 1).padStart(2, '0');
  });
}

function updateAddBtn() {
  const count = document.querySelectorAll('.addr-row').length;
  $('addAddrBtn').disabled = count >= MAX_ROWS;
  /* hide remove button when only 1 row */
  document.querySelectorAll('.addr-remove').forEach(btn => {
    btn.style.visibility = count <= 1 ? 'hidden' : 'visible';
  });
}

/* init first row */
createRow();

$('addAddrBtn').addEventListener('click', () => createRow());

/* ── CoinGecko price map ── */

const CHAIN_TO_GECKO = {
  ETH: 'ethereum', SOL: 'solana', BTC: 'bitcoin', BSC: 'binancecoin',
  BASE: 'ethereum', ARB: 'ethereum', MATIC: 'matic-network', SUI: 'sui'
};
const CHAIN_NATIVE = {
  ETH: 'ETH', SOL: 'SOL', BTC: 'BTC', BSC: 'BNB',
  BASE: 'ETH', ARB: 'ETH', MATIC: 'MATIC', SUI: 'SUI'
};
const GECKO_API = 'https://api.coingecko.com/api/v3/simple/price?ids=ethereum,solana,bitcoin,binancecoin,matic-network,sui&vs_currencies=usd';

let priceCache = null;

async function fetchPrices() {
  if (priceCache) return priceCache;
  try {
    const res = await fetch(GECKO_API);
    if (!res.ok) throw new Error(res.status);
    priceCache = await res.json();
    return priceCache;
  } catch (e) {
    return null;
  }
}

function convertUsdToNative(usd, chain, prices) {
  if (!prices || !usd) return null;
  const geckoId = CHAIN_TO_GECKO[chain];
  if (!geckoId || !prices[geckoId] || !prices[geckoId].usd) return null;
  const price = prices[geckoId].usd;
  if (price <= 0) return null;
  return parseFloat(usd) / price;
}

/* ── generate ── */

$('genBtn').addEventListener('click', () => {
  const rows = document.querySelectorAll('.addr-row');
  const addresses = [];
  const err = $('formError');

  for (let i = 0; i < rows.length; i++) {
    const wallet = rows[i].querySelector('.row-wallet').value.trim();
    const chainBtn = rows[i].querySelector('.chain-btn.selected');
    const chain = chainBtn ? chainBtn.dataset.chain : '';
    const num = i + 1;

    if (!wallet) { showError('address ' + num + ': wallet is required'); return; }
    if (!chain) { showError('address ' + num + ': select a chain'); return; }
    addresses.push({ wallet, chain });
  }

  err.classList.remove('show');

  const from = $('fromInput').value.trim();
  const expiry = $('expiryInput').value.trim();
  const usd = $('usdInput').value.trim();
  const note = $('noteInput').value.trim();

  /* build URL */
  const params = new URLSearchParams();
  if (from) params.set('from', from);
  if (expiry) params.set('expiry', expiry);
  addresses.forEach((a, i) => {
    const n = i + 1;
    params.set('a' + n, a.wallet);
    params.set('c' + n, a.chain);
  });
  if (usd) params.set('usd', usd);
  if (note) params.set('note', note);

  const qs = '?' + params.toString();
  currentPayUrl = window.location.origin + window.location.pathname + qs;
  history.pushState(null, '', qs);

  renderCard({ addresses, from, expiry, usd, note });
});

function showError(msg) {
  const err = $('formError');
  err.textContent = msg;
  err.classList.add('show');
}

/* ── render payment card ── */

async function renderCard(data) {
  const topEl = $('cardGlobalTop');
  const addrEl = $('cardAddresses');
  topEl.innerHTML = '';
  addrEl.innerHTML = '';

  /* fetch prices if USD amount provided */
  let prices = null;
  if (data.usd) {
    prices = await fetchPrices();
  }

  /* store for PDF generation */
  currentPayData = data;
  currentPrices = prices;

  /* from + expiry at top */
  if (data.from || data.expiry) {
    let metaHtml = '';
    if (data.from) metaHtml += '<div class="pay-meta">FROM: <span>' + escHtml(data.from) + '</span></div>';
    if (data.expiry) metaHtml += '<div class="pay-meta">VALID UNTIL: <span>' + formatDate(data.expiry) + '</span></div>';
    const metaSec = document.createElement('div');
    metaSec.className = 'pay-section';
    metaSec.innerHTML = metaHtml;
    topEl.appendChild(metaSec);
  }

  /* USD amount + note at top */
  if (data.usd) {
    const sec = document.createElement('div');
    sec.className = 'pay-section';
    sec.innerHTML = '<span class="pay-label">AMOUNT</span>' +
      '<div class="pay-amount"><span>$' + escHtml(data.usd) + '</span>' +
      '<span class="token">USD</span></div>';
    topEl.appendChild(sec);
  }

  if (data.note) {
    const sec = document.createElement('div');
    sec.className = 'pay-section';
    sec.innerHTML = '<span class="pay-label">NOTE</span>' +
      '<div class="pay-note">' + escHtml(data.note) + '</div>';
    topEl.appendChild(sec);
  }

  /* address blocks */
  data.addresses.forEach((a, i) => {
    if (i > 0) {
      const hr = document.createElement('hr');
      hr.className = 'addr-separator';
      addrEl.appendChild(hr);
    }

    const block = document.createElement('div');
    const qrId = 'qr_' + i;
    const addrId = 'addr_' + i;

    /* convert USD to native token */
    let convertedHtml = '';
    if (data.usd) {
      const native = convertUsdToNative(data.usd, a.chain, prices);
      const nativeSym = CHAIN_NATIVE[a.chain] || a.chain;
      if (native !== null) {
        const decimals = native < 0.001 ? 8 : native < 1 ? 6 : native < 100 ? 4 : 2;
        convertedHtml =
          '<div class="pay-section">' +
            '<span class="pay-label">EQUIVALENT</span>' +
            '<div class="pay-amount"><span>' + native.toFixed(decimals) + '</span>' +
            '<span class="token">' + escHtml(nativeSym) + '</span></div>' +
          '</div>';
      } else {
        convertedHtml =
          '<div class="pay-section">' +
            '<span class="pay-label">EQUIVALENT</span>' +
            '<div style="font-size:12px;color:#666;">price unavailable</div>' +
          '</div>';
      }
    }

    block.className = 'addr-block';
    block.innerHTML =
      '<div style="width:100%;box-sizing:border-box;">' +
        '<div class="pay-chain">' + escHtml(a.chain) + '</div>' +
        convertedHtml +
        '<div class="pay-section">' +
          '<span class="pay-label">SEND TO</span>' +
          '<div class="pay-address">' +
            '<code id="' + addrId + '">' + escHtml(a.wallet) + '</code>' +
            '<button class="copy-btn" data-addr="' + addrId + '">COPY</button>' +
          '</div>' +
        '</div>' +
        (data.usd ? '<div style="font-family:Space Mono,monospace;font-size:11px;color:#ff4500;opacity:.7;margin-top:4px;margin-bottom:4px;">* rates fetched live from CoinGecko. verify before sending.</div>' : '') +
      '</div>' +
      '<div class="addr-block-qr"><div id="' + qrId + '"></div></div>';

    addrEl.appendChild(block);

    /* QR */
    new QRCode(document.getElementById(qrId), {
      text: a.wallet,
      width: 180,
      height: 180,
      colorDark: '#0a0a0a',
      colorLight: '#f0f0f0',
      correctLevel: QRCode.CorrectLevel.M
    });

    /* copy button */
    block.querySelector('.copy-btn').addEventListener('click', function() {
      copyText(document.getElementById(this.dataset.addr).textContent, 'Address');
    });
  });

  /* switch view */
  $('generator').classList.remove('active');
  $('payCard').classList.remove('active');
  void $('payCard').offsetWidth;
  $('payCard').classList.add('active');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

/* ── PDF download ── */

function downloadPdf() {
  if (!currentPayData) return;
  var data = currentPayData;
  var prices = currentPrices;

  var today = new Date();
  var dateStr = today.getDate() + ' ' +
    ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][today.getMonth()] +
    ' ' + today.getFullYear();

  /* build body content */
  var body = '';

  /* header */
  body += '<div class="hdr"><div class="logo">findr <span>payment request</span></div><div class="date">' + escHtml(dateStr) + '</div></div>';

  /* from line */
  if (data.from) {
    body += '<div class="from">FROM: <b>' + escHtml(data.from) + '</b></div>';
  }

  /* amount + note on one line */
  if (data.usd || data.note) {
    body += '<div class="amt-row">';
    if (data.usd) body += '<span class="amt">$' + escHtml(data.usd) + ' <span class="tk">USD</span></span>';
    if (data.note) body += '<span class="note">' + escHtml(data.note) + '</span>';
    body += '</div>';
  }

  /* divider */
  body += '<hr class="div">';

  /* address rows */
  data.addresses.forEach(function(a, i) {
    if (i > 0) body += '<hr class="div">';
    body += '<div class="addr">';
    body += '<span class="chain">' + escHtml(a.chain) + '</span>';

    if (data.usd) {
      var native = convertUsdToNative(data.usd, a.chain, prices);
      var nativeSym = CHAIN_NATIVE[a.chain] || a.chain;
      if (native !== null) {
        var decimals = native < 0.001 ? 8 : native < 1 ? 6 : native < 100 ? 4 : 2;
        body += '<span class="equiv">' + native.toFixed(decimals) + ' <span class="tk">' + escHtml(nativeSym) + '</span></span>';
      } else {
        body += '<span class="equiv" style="color:#999;">—</span>';
      }
    }

    body += '<span class="wallet">' + escHtml(a.wallet) + '</span>';
    var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=' + encodeURIComponent(a.wallet);
    body += '<img class="qr" src="' + qrUrl + '" width="80" height="80">';
    body += '</div>';
  });

  /* disclaimer */
  if (data.usd) {
    body += '<div class="disc">Rates fetched live from CoinGecko at time of generation. Always verify the exact amount in your wallet before sending. findr pay does not process transactions.</div>';
  } else {
    body += '<div class="disc">findr pay does not process transactions. Always verify the wallet address before sending.</div>';
  }

  /* footer */
  body += '<div class="footer">create your own payment link at <span>findrdesk.com</span></div>';

  /* build full HTML document */
  var css =
    '*{margin:0;padding:0;box-sizing:border-box;}' +
    'body{font-family:"Courier New",Consolas,monospace;background:#fff;color:#111;padding:15mm;max-width:794px;margin:0 auto;}' +
    '.hdr{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid #ddd;margin-bottom:12px;}' +
    '.logo{font-size:16px;font-weight:700;letter-spacing:-1px;}' +
    '.logo span{color:#ff4500;}' +
    '.date{font-size:14px;color:#999;letter-spacing:1px;}' +
    '.from{font-size:14px;color:#555;margin-bottom:4px;}' +
    '.from b{color:#111;font-weight:700;}' +
    '.amt-row{display:flex;align-items:baseline;gap:20px;margin-bottom:8px;}' +
    '.amt{font-size:20px;font-weight:700;letter-spacing:-1px;}' +
    '.tk{color:#ff4500;font-size:12px;font-weight:400;}' +
    '.note{font-size:14px;color:#555;font-style:italic;}' +
    '.div{border:none;border-top:1px solid #e0e0e0;margin:8px 0;}' +
    '.addr{display:flex;align-items:center;gap:10px;padding:8px 0;page-break-inside:avoid;}' +
    '.chain{flex-shrink:0;font-size:8px;letter-spacing:2px;color:#ff4500;border:1px solid #ff4500;padding:2px 8px;text-align:center;min-width:48px;}' +
    '.equiv{flex-shrink:0;width:130px;font-size:10px;font-weight:700;letter-spacing:-.5px;}' +
    '.wallet{flex:1;font-size:8px;word-break:break-all;line-height:1.4;background:#f8f8f8;border:1px solid #e8e8e8;padding:6px 8px;min-width:0;}' +
    '.qr{flex-shrink:0;border:3px solid #111;display:block;}' +
    '.disc{font-size:11px;color:#ff4500;margin-top:14px;padding-top:8px;border-top:1px solid #e0e0e0;letter-spacing:.3px;line-height:1.5;}' +
    '.footer{font-size:13px;color:#aaa;text-align:center;margin-top:12px;letter-spacing:.5px;font-weight:700;}' +
    '.footer span{color:#ff4500;}';

  if (isMobile) {
    /* mobile: download as HTML file */
    var htmlDoc = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>findr pay invoice</title><style>' +
      css + '</style></head><body>' + body + '</body></html>';
    var blob = new Blob([htmlDoc], { type: 'text/html' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'findr-pay-invoice.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } else {
    /* desktop: open new window with print button */
    var btnCss =
      '.save-btn{position:fixed;top:16px;right:16px;background:#ff4500;color:#fff;font-family:"Courier New",Consolas,monospace;font-size:11px;font-weight:700;letter-spacing:2px;border:none;padding:10px 20px;cursor:pointer;}' +
      '.save-btn:hover{opacity:.85;}' +
      '@page{size:A4;margin:15mm;}' +
      '@media print{body{padding:0;}.save-btn{display:none;}}';
    var w = window.open('', '_blank');
    w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>findr pay invoice</title><style>' +
      css + btnCss +
    '</style></head><body><button class="save-btn" onclick="window.print()">PRINT / SAVE PDF</button>' + body + '</body></html>');
    w.document.close();
  }
}

/* ── show generator ── */

function showGenerator() {
  history.pushState(null, '', window.location.pathname);
  $('payCard').classList.remove('active');
  void $('generator').offsetWidth;
  $('generator').classList.add('active');
}

/* ── copy helpers ── */

function copyText(text, label) {
  navigator.clipboard.writeText(text).then(() => toast(label + ' copied'));
}

function copyPayLink() {
  navigator.clipboard.writeText(currentPayUrl).then(() => toast('Link copied'));
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

/* ── parse URL params on load ── */

function parseUrlAddresses(params) {
  const addresses = [];
  for (let n = 1; n <= MAX_ROWS; n++) {
    const wallet = params.get('a' + n);
    const chain = params.get('c' + n);
    if (wallet && chain) {
      addresses.push({ wallet, chain: chain.toUpperCase() });
    } else {
      break;
    }
  }
  return addresses;
}

(function() {
  const params = new URLSearchParams(window.location.search);
  const addresses = parseUrlAddresses(params);
  if (addresses.length > 0) {
    currentPayUrl = window.location.href;
    renderCard({
      addresses,
      from: params.get('from') || '',
      expiry: params.get('expiry') || '',
      usd: params.get('usd') || '',
      note: params.get('note') || ''
    });
  }
})();

/* ── handle browser back ── */

window.addEventListener('popstate', () => {
  const params = new URLSearchParams(window.location.search);
  const addresses = parseUrlAddresses(params);
  if (addresses.length > 0) {
    currentPayUrl = window.location.href;
    renderCard({
      addresses,
      from: params.get('from') || '',
      expiry: params.get('expiry') || '',
      usd: params.get('usd') || '',
      note: params.get('note') || ''
    });
  } else {
    $('payCard').classList.remove('active');
    $('generator').classList.add('active');
  }
});
</script>
</body>
</html>
